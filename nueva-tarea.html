<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DiTareas — Nueva tarea</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="create">

  <header class="app-header">
    <div class="header-inner">
      <a href="index.html" class="brand-group">
        <div class="brand-logo">
          <img src="Gemini_Generated_Image_nt6mnznt6mnznt6m.png" alt="" />
        </div>
        <div>
          <div class="brand-name">DiTareas</div>
          <div class="brand-tagline">Gestor de tareas</div>
        </div>
      </a>
      <nav class="site-nav">
        <a href="index.html">Inicio</a>
        <a href="tareas.html">Mis tareas</a>
        <a href="nueva-tarea.html" class="nav-cta active">+ Nueva tarea</a>
      </nav>
    </div>
  </header>

  <main class="main-content">
    <div class="page-wrapper">

      <div class="page-title-row">
        <h1 class="page-title">Nueva tarea</h1>
        <span class="page-subtitle">Completa los campos y guarda tu tarea</span>
      </div>

      <div class="form-card">
        <form id="taskForm">

          <div class="form-grid">

            <div class="form-field">
              <label class="form-label" for="taskTitle">Nombre de la tarea <span>*</span></label>
              <input class="form-input" type="text" id="taskTitle" placeholder="Ej. Preparar informe mensual" required />
            </div>

            <div class="form-field">
              <label class="form-label" for="taskDescription">Descripción</label>
              <textarea class="form-textarea" id="taskDescription" placeholder="Describe los detalles de la tarea..."></textarea>
            </div>

          </div>

          <div class="form-divider"></div>

          <div class="form-grid form-grid-2">

            <div class="form-field">
              <label class="form-label" for="taskDate">Fecha objetivo</label>
              <input class="form-input" type="date" id="taskDate" />
            </div>

            <div class="form-field">
              <label class="form-label" for="taskPriority">Prioridad</label>
              <select class="form-select" id="taskPriority">
                <option value="Alta">🔴 Alta</option>
                <option value="Media" selected>🟡 Media</option>
                <option value="Baja">⚪ Baja</option>
              </select>
            </div>

            <div class="form-field full">
              <p style="color: var(--ink-2); font-size: 0.94rem; margin: 0;">La evidencia puede agregarse después de crear la tarea desde la lista de tareas.</p>
            </div>

          </div>

          <div class="form-divider"></div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">
              <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
              Agregar tarea
            </button>
            <a href="tareas.html" class="btn btn-secondary">Ver tareas</a>
            <a href="index.html" class="btn btn-ghost">Cancelar</a>
          </div>

        </form>
      </div>

    </div>
  </main>

  <div id="toast"></div>
  <script src="js/app.js"></script>
  <script>
    const fileInput = document.getElementById('taskEvidenceImage');
    const fileNameEl = document.getElementById('fileName');
    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) {
        fileNameEl.textContent = '✓ ' + fileInput.files[0].name;
        fileNameEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
