<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DiTareas — Nueva tarea</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="create">

  <header class="app-header">
    <div class="header-inner">
      <a href="index.html" class="brand-group">
        <div class="brand-logo">
          <img src="Gemini_Generated_Image_nt6mnznt6mnznt6m.png" alt="" />
        </div>
        <div>
          <div class="brand-name">DiTareas</div>
          <div class="brand-tagline">Gestor de tareas</div>
        </div>
      </a>
      <nav class="site-nav">
        <a href="index.html">Inicio</a>
        <a href="tareas.html">Mis tareas</a>
        <a href="nueva-tarea.html" class="nav-cta active">+ Nueva tarea</a>
      </nav>
    </div>
  </header>

  <main class="main-content">
    <div class="page-wrapper">

      <div class="page-title-row">
        <h1 class="page-title">Nueva tarea</h1>
        <span class="page-subtitle">Completa los campos y guarda tu tarea</span>
      </div>

      <div class="form-card">
        <form id="taskForm">

          <div class="form-grid">

            <div class="form-field">
              <label class="form-label" for="taskTitle">Nombre de la tarea <span>*</span></label>
              <input class="form-input" type="text" id="taskTitle" placeholder="Ej. Preparar informe mensual" required />
            </div>

            <div class="form-field">
              <label class="form-label" for="taskDescription">Descripción</label>
              <textarea class="form-textarea" id="taskDescription" placeholder="Describe los detalles de la tarea..."></textarea>
            </div>

          </div>

          <div class="form-divider"></div>

          <div class="form-grid form-grid-2">

            <div class="form-field">
              <label class="form-label" for="taskDate">Fecha objetivo</label>
              <input class="form-input" type="date" id="taskDate" />
            </div>

            <div class="form-field">
              <label class="form-label" for="taskPriority">Prioridad</label>
              <select class="form-select" id="taskPriority">
                <option value="Alta">🔴 Alta</option>
                <option value="Media" selected>🟡 Media</option>
                <option value="Baja">⚪ Baja</option>
              </select>
            </div>

            <div class="form-field full">
              <label class="form-label" for="taskEvidenceImages">Evidencias (hasta 10 archivos)</label>
              <div class="form-file">
                <input type="file" id="taskEvidenceImages" accept="image/*" multiple />
                <label class="form-file-label" for="taskEvidenceImages">
                  <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 0.5rem;display:block;opacity:0.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>
                  <strong>Haz clic para subir</strong><br>
                  <span style="font-size:0.75rem">Selecciona varias imágenes</span>
                </label>
                <p id="taskEvidenceFileNames" style="font-size:0.8rem;color:var(--accent-mid);margin-top:0.5rem;display:none;"></p>
              </div>
            </div>

          </div>

          <div class="form-divider"></div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">
              <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
              Agregar tarea
            </button>
            <a href="tareas.html" class="btn btn-secondary">Ver tareas</a>
            <a href="index.html" class="btn btn-ghost">Cancelar</a>
          </div>

        </form>
      </div>

    </div>
  </main>

  <div id="toast"></div>
  <script src="js/app.js"></script>
  <script>
    const fileInput = document.getElementById('taskEvidenceImages');
    const fileNameEl = document.getElementById('taskEvidenceFileNames');
    if (fileInput && fileNameEl) {
      fileInput.addEventListener('change', () => {
        const files = Array.from(fileInput.files);
        if (files.length === 0) {
          fileNameEl.textContent = '';
          fileNameEl.style.display = 'none';
          return;
        }
        fileNameEl.textContent = `✓ ${files.length} archivo(s) seleccionado(s)`;
        fileNameEl.style.display = 'block';
      });
    }
  </script>
</body>
</html>
