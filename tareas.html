<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DiTareas — Mis tareas</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="tasks">

  <header class="app-header">
    <div class="header-inner">
      <a href="index.html" class="brand-group">
        <div class="brand-logo">
          <img src="Gemini_Generated_Image_nt6mnznt6mnznt6m.png" alt="" />
        </div>
        <div>
          <div class="brand-name">DiTareas</div>
          <div class="brand-tagline">Gestor de tareas</div>
        </div>
      </a>
      <nav class="site-nav">
        <a href="index.html">Inicio</a>
        <a href="tareas.html" class="active">Mis tareas</a>
        <a href="nueva-tarea.html" class="nav-cta">+ Nueva tarea</a>
      </nav>
    </div>
  </header>

  <main class="main-content">
    <div class="page-wrapper">

      <div class="page-title-row">
        <h1 class="page-title">Mis tareas</h1>
      </div>

      <div class="table-card">
        <div class="table-header">
          <div style="display:flex;align-items:center;gap:0.75rem;">
            <span class="table-title">Lista de tareas</span>
            <span class="table-count" id="taskCountBadge">0 tareas</span>
          </div>
          <a href="nueva-tarea.html" class="btn btn-primary btn-sm">
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
            Nueva tarea
          </a>
        </div>

        <div class="table-wrapper">
          <table id="taskTable">
            <thead>
              <tr>
                <th>Tarea</th>
                <th>Descripción</th>
                <th>Fecha</th>
                <th>Prioridad</th>
                <th>Estado</th>
                <th>Evidencia</th>
                <th>Horas</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody>
              <!-- Filled by app.js -->
            </tbody>
          </table>
        </div>

        <div id="emptyState" class="empty-state" style="display:none;">
          <div class="empty-icon">
            <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
          </div>
          <p style="font-size:1rem;font-weight:600;color:var(--ink-2);">No hay tareas aún</p>
          <p>Crea tu primera tarea para empezar a organizar tu día.</p>
          <a href="nueva-tarea.html" class="btn btn-primary" style="margin-top:1.25rem;">Crear primera tarea</a>
        </div>

      </div>
    </div>
  </main>

  <div id="toast"></div>
  <script src="js/app.js"></script>
</body>
</html>
